<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wikidata Embeds</title>
    <style>
        body {
            margin: 0;
            padding: 24px;
            background: #f8f8f8;
            font-family: sans-serif;
            box-sizing: border-box;
        }
        h1 {
            font-size: 22px;
            margin: 0 0 6px;
            color: #222;
        }
        #entity-id {
            font-size: 13px;
            color: #888;
            margin: 0 0 24px;
        }
        #entity-id a {
            color: #36c;
        }
        .section {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            margin-bottom: 24px;
        }
        .section h2 {
            font-size: 13px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 0 12px;
        }
        .watch-link {
            margin-top: 6px;
            font-size: 13px;
        }
        .watch-link a {
            color: #36c;
        }
        #status {
            color: #555;
            font-style: italic;
        }
        #error {
            color: #c00;
        }
    </style>
</head>
<body>
    <h1 id="title">Loading…</h1>
    <p id="entity-id"></p>
    <p id="status"></p>
    <p id="error" style="display:none"></p>
    <div id="embeds"></div>

    // ---- Configure embed types here ----
    // Each entry needs:
    //   property: Wikidata property ID
    //   label: human-readable name shown as a heading

            property: 'P1651',
            label: 'YouTube (video)',
            html: function (id) {
                var watchUrl = 'https://www.youtube.com/watch?v=' + encodeURIComponent(id);
                return '<iframe width="560" height="315"' +
                    ' src="https://www.youtube.com/embed/' + encodeURIComponent(id) + '"' +
                    ' frameborder="0"' +
                    ' allowfullscreen></iframe>' +
                    '<div class="watch-link"><a href="' + watchUrl + '" target="_blank">Watch on YouTube</a></div>';
            }
        },
        {
            property: 'P2397',
            label: 'YouTube (channel uploads playlist)',
            html: function (id) {
                var playlistId = id.replace(/^UC/, 'UU');
                var channelUrl = 'https://www.youtube.com/channel/' + encodeURIComponent(id) + '/videos';

                    ' src="https://www.youtube.com/embed/videoseries?list=' + encodeURIComponent(playlistId) + '"' +
                    ' frameborder="0"' +
                    ' allowfullscreen></iframe>' +
                    '<div class="watch-link"><a href="' + channelUrl + '" target="_blank">View channel on YouTube</a></div>';
