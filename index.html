<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wikidata Embeds</title>
    <style>
        body {
            margin: 0;
            padding: 24px;
            background: #f8f8f8;
            font-family: sans-serif;
            box-sizing: border-box;
        }
        h1 {
            font-size: 22px;
            margin: 0 0 4px;
            color: #222;
        }
        #entity-id {
            font-size: 13px;
            color: #888;
            margin: 0 0 4px;
        }
        #entity-id a {
            color: #36c;
        }
        #wikipedia-link {
            font-size: 13px;
            color: #888;
            margin: 0 0 24px;
        }
        #wikipedia-link a {
            color: #36c;
        }
        .section {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            margin-bottom: 24px;
        }
        .section h2 {
            font-size: 13px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 0 12px;
        }
        .watch-link {
            margin-top: 6px;
            font-size: 13px;
        }
        .watch-link a {
            color: #36c;
        }
        #status {
            color: #555;
            font-style: italic;
        }
        #error {
            color: #c00;
        }
    </style>
</head>
<body>
    <h1 id="title">Loading&hellip;</h1>
    <p id="entity-id"></p>
    <p id="wikipedia-link" style="display:none"></p>
    <p id="status"></p>
    <p id="error" style="display:none"></p>
    <div id="embeds"></div>

    <script>
    // ---- Configure embed types here ----
    // Each entry needs:
    //   property: Wikidata property ID
    //   label: human-readable name shown as a heading
    //   html: function taking the property value, returning embed HTML
    var EMBED_CONFIGS = [
        {
            property: 'P6276',
            label: 'Amazon Music (artist)',
            html: function (id) {
                var profileUrl = 'https://music.amazon.com/artists/' + encodeURIComponent(id);
                return '<a href="' + profileUrl + '" target="_blank"' +
                    ' style="display:inline-block;padding:10px 20px;background:#232f3e;color:#fff;' +
                    'font-family:sans-serif;font-size:15px;border-radius:8px;text-decoration:none;">' +
                    '\u266a Listen on Amazon Music</a>';
            }
        },

        {
            property: 'P2281',
            label: 'Apple Music album',
            html: function (id) {
                return '<iframe allow="autoplay *; encrypted-media *; fullscreen *; clipboard-write" frameborder="0" height="450" style="width:100%;max-width:660px;overflow:hidden;border-radius:10px;" sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation-by-user-activation" src="https://embed.music.apple.com/us/album/hello-world/' + encodeURIComponent(id) + '"></iframe>';
            }
        },

        {
            property: 'P11354',
            label: 'Bandcamp release',
            html: function (id) {
                return '<iframe style="border: 0; width: 350px; height: 786px;" src="https://bandcamp.com/EmbeddedPlayer/album=' + encodeURIComponent(id) + '/size=large" seamless></iframe>';
            }
        },

        {
            property: 'P7317',
            label: 'iHeart artist radio',
            html: function (id) {
                return '<iframe allow="autoplay" width="100%" height="200" src="https://www.iheart.com/artist/hello-world-' + encodeURIComponent(id) + '?embed=true" frameborder="0"></iframe>';
            }
        },

        {
            property: 'P724',
            label: 'Internet Archive',
            html: function (id) {
                return '<iframe src="https://archive.org/embed/' + encodeURIComponent(id) + '"' +
                    ' width="640" height="480" frameborder="0"' +
                    ' webkitallowfullscreen="true" mozallowfullscreen="true" allowfullscreen></iframe>';
            }
        },

        {
            property: 'P12813',
            label: 'itch.io',
            html: function (id) {
                return '<iframe frameborder="0" height="167" width="552" src="https://itch.io/embed/' + encodeURIComponent(id) + '"></iframe>';
            }
        },

        {
            property: 'P3040',
            label: 'SoundCloud',
            html: function (id) {
                var profileUrl = encodeURIComponent('https://soundcloud.com/' + id);
                return '<iframe width="100%" height="300" scrolling="no" frameborder="no"' +
                    ' allow="autoplay"' +
                    ' src="https://w.soundcloud.com/player/?url=' + profileUrl +
                    '&color=%23ff5500&auto_play=false&hide_related=false' +
                    '&show_comments=true&show_user=true&show_reposts=false&show_teaser=true&visual=true">' +
                    '</iframe>';
            }
        },

        {
            property: 'P1902',
            label: 'Spotify (artist)',
            html: function (id) {
                return '<iframe src="https://open.spotify.com/embed/artist/' + encodeURIComponent(id) + '"' +
                    ' width="100%" height="352" frameborder="0"' +
                    ' style="border-radius:12px"' +
                    ' allowfullscreen></iframe>';
            }
        },

        {
            property: 'P2205',
            label: 'Spotify (album)',
            html: function (id) {
                return '<iframe src="https://open.spotify.com/embed/album/' + encodeURIComponent(id) + '"' +
                    ' width="100%" height="352" frameborder="0"' +
                    ' style="border-radius:12px"' +
                    ' allowfullscreen></iframe>';
            }
        },

        {
            property: 'P2207',
            label: 'Spotify (track)',
            html: function (id) {
                return '<iframe src="https://open.spotify.com/embed/track/' + encodeURIComponent(id) + '"' +
                    ' width="100%" height="152" frameborder="0"' +
                    ' style="border-radius:12px"' +
                    ' allowfullscreen></iframe>';
            }
        },

        {
            property: 'P8704',
            label: 'Spotify (playlist)',
            html: function (id) {
                return '<iframe src="https://open.spotify.com/embed/playlist/' + encodeURIComponent(id) + '"' +
                    ' width="100%" height="352" frameborder="0"' +
                    ' style="border-radius:12px"' +
                    ' allowfullscreen></iframe>';
            }
        },

        {
            property: 'P5916',
            label: 'Spotify (podcast)',
            html: function (id) {
                return '<iframe src="https://open.spotify.com/embed/show/' + encodeURIComponent(id) + '"' +
                    ' width="100%" height="352" frameborder="0"' +
                    ' style="border-radius:12px"' +
                    ' allowfullscreen></iframe>';
            }
        },
			{
            property: 'P1733',
            label: 'Steam',
            html: function (id) {
                return '<iframe src="https://store.steampowered.com/widget/' + encodeURIComponent(id) + '/"' +
                    ' frameborder="0" width="646" height="190"></iframe>';
            }
        },
                {
            property: 'P2397',
            label: 'YouTube (channel uploads playlist)',
            html: function (id) {
                var playlistId = id.replace(/^UC/, 'UU');
                var channelUrl = 'https://www.youtube.com/channel/' + encodeURIComponent(id) + '/videos';
                return '<iframe width="560" height="315"' +
                    ' src="https://www.youtube.com/embed/videoseries?list=' + encodeURIComponent(playlistId) + '"' +
                    ' frameborder="0"' +
                    ' allowfullscreen></iframe>' +
                    '<div class="watch-link"><a href="' + channelUrl + '" target="_blank">View channel on YouTube</a></div>';
            }
        },

        {
            property: 'P1651',
            label: 'YouTube (video)',
            html: function (id) {
                var watchUrl = 'https://www.youtube.com/watch?v=' + encodeURIComponent(id);
                return '<iframe width="560" height="315"' +
                    ' src="https://www.youtube.com/embed/' + encodeURIComponent(id) + '"' +
                    ' frameborder="0"' +
                    ' allowfullscreen></iframe>' +
                    '<div class="watch-link"><a href="' + watchUrl + '" target="_blank">Watch on YouTube</a></div>';
            }
        },

        // ---- Add more embed types here ----
        // Example:
        // {
        //     property: 'PXXXX',
        //     label: 'Service name',
        //     html: function (id) {
        //         return '<iframe src="https://example.com/embed/' + encodeURIComponent(id) + '"' +
        //             ' width="100%" height="352" frameborder="0"></iframe>';
        //     }
        // },
    ];
    // ------------------------------------

    function setStatus(msg) {
        document.getElementById('status').textContent = msg;
    }

    function setError(msg) {
        var el = document.getElementById('error');
        el.textContent = msg;
        el.style.display = '';
        document.getElementById('status').textContent = '';
    }

    function getParam(name) {
        var match = location.search.match(new RegExp('[?&]' + name + '=([^&]+)'));
        return match ? decodeURIComponent(match[1]) : null;
    }

    var entityId = getParam('q');
    if (!entityId || !entityId.match(/^Q\d+$/)) {
        document.getElementById('title').textContent = 'Wikidata Embeds';
        setError('No valid Wikidata item ID provided. Use this page via the bookmarklet on a Wikidata or Wikipedia page.');
        document.getElementById('entity-id').style.display = 'none';
    } else {
        document.title = entityId + ' \u2014 Wikidata Embeds';
        document.getElementById('entity-id').innerHTML =
            'Wikidata: <a href="https://www.wikidata.org/wiki/' + entityId + '" target="_blank">' + entityId + '</a>';
        setStatus('Fetching data\u2026');

        var claimsUrl = 'https://www.wikidata.org/w/api.php?action=wbgetclaims' +
            '&entity=' + entityId + '&format=json&origin=*';

        // Use separate props values joined by | directly in the string
        // sitefilter limits sitelinks to enwiki only so we don't get hundreds of sitelinks back
        var entityUrl = 'https://www.wikidata.org/w/api.php?action=wbgetentities' +
            '&ids=' + entityId +
            '&props=labels|sitelinks' +
            '&sitefilter=enwiki' +
            '&languages=en' +
            '&format=json&origin=*';

        Promise.all([
            fetch(claimsUrl).then(function (r) { return r.json(); }),
            fetch(entityUrl).then(function (r) { return r.json(); })
        ])
        .then(function (results) {
            var claimsData = results[0];
            var entityData = results[1];
            var entity = entityData.entities && entityData.entities[entityId];

            // Label
            var label = null;
            try {
                label = entity.labels.en.value;
            } catch (e) {}

            if (label) {
                document.getElementById('title').textContent = label;
                document.title = label + ' \u2014 Wikidata Embeds';
            } else {
                document.getElementById('title').textContent = 'Unlabelled item (' + entityId + ')';
                document.title = entityId + ' \u2014 Wikidata Embeds';
            }

            // Wikipedia sitelink
            var wpTitle = null;
            try {
                wpTitle = entity.sitelinks.enwiki.title;
            } catch (e) {}

            if (wpTitle) {
                var wpUrl = 'https://en.wikipedia.org/wiki/' + encodeURIComponent(wpTitle.replace(/ /g, '_'));
                var wpEl = document.getElementById('wikipedia-link');
                wpEl.innerHTML = 'Wikipedia: <a href="' + wpUrl + '" target="_blank">' + wpTitle + '</a>';
                wpEl.style.display = '';
            }

            // Embeds
            var embeds = document.getElementById('embeds');
            var found = 0;

            EMBED_CONFIGS.forEach(function (config) {
                var claims = claimsData.claims && claimsData.claims[config.property];
                if (!claims || !claims.length) {
                    return;
                }
                claims.forEach(function (claim) {
                    if (!claim.mainsnak || !claim.mainsnak.datavalue) {
                        return;
                    }
                    var value = claim.mainsnak.datavalue.value;
                    if (!value) {
                        return;
                    }

                    var section = document.createElement('div');
                    section.className = 'section';
                    section.innerHTML = '<h2>' + config.label + '</h2>' + config.html(value);
                    embeds.appendChild(section);
                    found++;
                });
            });

            if (found === 0) {
                setError('No embeddable properties found for ' + entityId + '.');
            } else {
                setStatus('');
            }
        })
        .catch(function (err) {
            setError('Error fetching data: ' + err);
        });
    }
    </script>
</body>
</html>
